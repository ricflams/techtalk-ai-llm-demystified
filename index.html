<h2 id="or-a-eye-opening-insight">or  &quot;A eye opening insight&quot;</h2>
<p>Richard Flamsholt · 2026</p>
<h4 id=""></h4>
<p>What do I want to tell:<br />
Token, Embedding, LLM, Context, AI-model, Agent, (Prompt), Modes, Thinking, Agent-files, Skills, Tools, MCP - and more.<br />

<p>I hope you'll latch onto something and refer back to the slides and me if you've got questions.</p>

<h4 id="why-this-presentation">Why this presentation?</h4>
<p>What can I possibly say that hasn't already been said in the 10,000,000 existing AI-related videos?<br />
Why is one more presentation about LLMs useful?</p>
<p>I guess for the same reason that you ask an AI about any topic instead of reading some of the 10,000,000 webpages about that topic: you get a personal, curated presentation that tells the story in a way I find insightful - hopefully presenting <strong>just the good bits</strong> from those 10,000,000 videos. Also, you can ask any questions you have.</p>

<h2 id="all-the-parts">All the parts</h2>
<img class="full" src="images/overview/full.png" />
<p>The <strong>human</strong> use an <strong>AI Agent</strong> to communicate with an <strong>AI Service</strong>, that turn your message into <strong>tokens</strong> and feed it through an <strong>LLM</strong>. The service and agent can use <strong>tools</strong> and the agent also has <strong>memory</strong>.</p>
</section>

<h3 id="a-token-is">A token is</h3>
<ul>
<li data-marpit-fragment="1">Practically, for you: it's <strong>a word</strong></li>
</ul>

<ul>
<li data-marpit-fragment="2">More precisely: it is the <strong>chunks</strong> the AI break your text into</li>
</ul>

<ul>
<li data-marpit-fragment="3">What you ultimately <strong>pay for</strong> - it's the <strong>unit of work</strong> for the LLM</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" lang="POSIX" data-marpit-pagination="11" style="--paginate:true;" data-marpit-pagination-total="85" data-transition-back="{&quot;name&quot;:&quot;reveal&quot;,&quot;builtinFallback&quot;:true}" data-transition="{&quot;name&quot;:&quot;reveal&quot;,&quot;builtinFallback&quot;:true}">

<p>Notice that &quot;hello&quot; in the gpt-4o tokenizer is #24912 and in the ChatGPT vocabulary it's 15339. Vocabularies change from model to model. The concrete numbers doesn't matter outside of the AI service so you shouldn't rely on them.</p>

<h3 id="tokens-summarized">Tokens, summarized</h3>
<ul>
<li data-marpit-fragment="1">A <strong>token</strong> is the <strong>chunk of text</strong> the AI service can reason about</li>
<li data-marpit-fragment="2">Models typically have a <strong>vocabulary</strong> of 200,000 tokens</li>
<li data-marpit-fragment="3">For English, 1 token is roughly 1 word</li>
</ul>
<p>And last, but not least:</p>
<ul>
<li data-marpit-fragment="4">AI services <strong>charges per token</strong>, since tokens are the unit the LLM works on</li>
<li data-marpit-fragment="5">A ballpark figure: you pay <strong>$1 for 100,000 tokens</strong></li>
<li data-marpit-fragment="6">100,000 tokens amounts to <em>&quot;Harry Potter and the Philosopher's Stone&quot;</em></li>
</ul>
<h4 id="-12"></h4>
<p>For English, one token generally corresponds to about 4 characters. For a text the number of tokens will typically be 30% higher than the number of words, ie 1000 words means 1300 tokens - broadly speaking.</p>
</section>

<h3 id="%E2%9A%A0%EF%B8%8F-warning-%E2%9A%A0%EF%B8%8F"><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Warning <img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/></h3>
<p>This will sound confusing</p>
<p>Stay with me.</p>
<p>Computers don't understand the word &quot;cat.&quot; They understand numbers. So we need a way to turn &quot;cat&quot; into numbers in a way that preserves its meaning. That's what an embedding does.</p>
<img class="half" src="images/embedding/confused.png" />
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" lang="POSIX" data-marpit-pagination="28" style="--paginate:true;" data-marpit-pagination-total="85" data-transition-back="{&quot;name&quot;:&quot;reveal&quot;,&quot;builtinFallback&quot;:true}" data-transition="{&quot;name&quot;:&quot;reveal&quot;,&quot;builtinFallback&quot;:true}">
<h3 id="an-embedding-is-a-thing-not-an-action">An &quot;embedding&quot; is a thing, not an action</h3>
<img class="full" src="images/embedding/bicycle-tree.jpg" />
<h4 id="notes">Notes</h4>
<p>In everyday English, &quot;embedding&quot; sounds like something you do: the act of placing something into something else.</p>
<p>In AI, it means the concrete vector of numbers that <em>somehow</em> represent the characteristics of something. It's a noun, not a verb. It's a &quot;thing&quot;, not something that &quot;happens&quot;.</p>
</section>

<h3 id="thats-an-embedding">That's an embedding</h3>
<img class="full" src="images/embedding/20d-with-tokens.svg" />
<p>Every <strong>column</strong> here is an embedding:</p>
<p>An embedding is <strong>list of numbers</strong> (a <em>vector</em>) that <em>somehow</em> characterise <strong>everything imaginable!</strong> I say somehow because we don't know what each part of the dimensions does - it's just math that works our.</p>
<p>For example: Any <strong>word</strong> you know. Any <strong>sentence</strong> there exist. Any <strong>feeling</strong> you can have. The concept of <strong>keeping an audience in suspense, eager for the next slide</strong>, too.</p>
<h4 id="-13"></h4>
<p>Also called <em>tensor</em> in python, or <em>hidden state</em> when speaking about the LLM.</p>

<h3 id="the-values-of-an-embedding">The values of an embedding</h3>
<img class="full" src="images/embedding/embedding_matrix.svg" />
<h4 id="-14"></h4>
<p>Also sometimes called as &quot;features&quot;, as each value in the vector encodes some learned semantic trait of the token. Like eg &quot;catness&quot; or &quot;largeness&quot;.</p>
<p>In practice though we simply don't know what those dimensions mean. They don't map crisply to existing human concepts. Dimension 847 might contribute a little to formality, a little to temporal reference, a little to something related to food, and a lot to some abstract statistical regularity that doesn't map to any word in English.</p>
<p>There's a research field called mechanistic interpretability that tries to decompose these representations into interpretable directions. They can extract interpretable features, but understanding how features compose to produce behavior is still largely unsolved.</p>
<ul>
<li data-marpit-fragment="1"><a href="https://learnmechinterp.com/topics/scaling-monosemanticity/">Scaling Monosemanticity and Feature Steering</a></li>
<li data-marpit-fragment="2"><a href="https://www.anthropic.com/research/emotion-concepts-function">Emotion concepts and their function in a large language model</a></li>
<li data-marpit-fragment="3"><a href="https://www.youtube.com/watch?v=9-Jl0dxWQs8">How might LLMs store facts | Deep Learning Chapter 7 (3Blue1Brown)</a></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" lang="POSIX" data-marpit-pagination="43" style="--paginate:true;" data-marpit-pagination-total="85" data-transition-back="{&quot;name&quot;:&quot;reveal&quot;,&quot;builtinFallback&quot;:true}" data-transition="{&quot;name&quot;:&quot;reveal&quot;,&quot;builtinFallback&quot;:true}">

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" lang="POSIX" data-marpit-pagination="44" style="--paginate:true;" data-marpit-pagination-total="85" data-transition-back="{&quot;name&quot;:&quot;reveal&quot;,&quot;builtinFallback&quot;:true}" data-transition="{&quot;name&quot;:&quot;reveal&quot;,&quot;builtinFallback&quot;:true}">
<h2 id="llm">LLM</h2>
<img class="full" src="images/overview/llm.png" />
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" lang="POSIX" data-marpit-pagination="45" style="--paginate:true;" data-marpit-pagination-total="85" data-transition-back="{&quot;name&quot;:&quot;reveal&quot;,&quot;builtinFallback&quot;:true}" data-transition="{&quot;name&quot;:&quot;reveal&quot;,&quot;builtinFallback&quot;:true}">
<h3 id="the-llm-is">The LLM is</h3>
<p>a humongous calculator that can do just one thing: predict the next word.</p>
<p><em>or more precisely</em></p>
<p><strong>Run math on embeddings and produce probabilities for the next token</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" lang="POSIX" data-marpit-pagination="46" style="--paginate:true;" data-marpit-pagination-total="85" data-transition-back="{&quot;name&quot;:&quot;reveal&quot;,&quot;builtinFallback&quot;:true}" data-transition="{&quot;name&quot;:&quot;reveal&quot;,&quot;builtinFallback&quot;:true}">
<h3 id="our-example">Our example</h3>
<img class="full" src="images/llm/what-is-an-llm-example.png" />
<h4 id="-15"></h4>
<p>Two things to note here:</p>
<p>Why only <code>An</code>? Why not the full answer? Yeah, hold your horses just a bit longer, because: the LLM only deals with producing one next token. That's all it is concerned about: figuring out with which <em>probablility</em> any of the tokens is the vocabulary has for being the next token.</p>
<p>That's the second thing to note: the LLM itself actually just produce this set of probabilities. The mechanism that actually <em>picks that next token</em> is strictly speaking outside the LLM. Let's include it here to convey that the outcome eventually is a token, namely <code>An</code> in this case.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" lang="POSIX" data-marpit-pagination="47" style="--paginate:true;" data-marpit-pagination-total="85" data-transition-back="{&quot;name&quot;:&quot;reveal&quot;,&quot;builtinFallback&quot;:true}" data-transition="{&quot;name&quot;:&quot;reveal&quot;,&quot;builtinFallback&quot;:true}">
<h3 id="attention-is-all-you-need">Attention is all you need</h3>

<img class="full" src="images/llm/next-token-prediction.svg" />
<h4 id="-29"></h4>
<p>The cosine similarity of 0.97 is computed in isolation — it's purely a geometric measurement between two vectors, with no knowledge of the other 127,999 tokens. The 91% is a different kind of number entirely: it's the result of a competition. Softmax takes all 128,000 similarity scores simultaneously, exponentiates each one, and divides by their sum. Every token competes against every other token at once. &quot;Stronger&quot; claimed 91% of the total probability mass — not because 0.97 is intrinsically high, but because it pulled far enough ahead of the field. A high cosine similarity is the evidence. The probability is the verdict.</p>

<h2 id="level-3a-skills">Level 3a: Skills</h2>
<h2 id="skills-look-like-a-smart-routing-system--describe-what-a-skill-does-and-claude-figures-out-when-to-use-it-but-the-routing-isnt-magic-and-it-isnt-symmetrictheres-an-instruction-baked-into-claude-codes-system-prompt-that-says-roughly-before-writing-code-or-creating-files-check-whether-any-skills-are-relevant-that-instruction-is-what-makes-skills-feel-reliable-for-those-task-types-its-a-forcing-function--the-model-is-explicitly-told-to-look-before-it-actsfor-everything-else--answering-questions-explaining-concepts-responding-to-anything-conversational--theres-no-forcing-function-the-model-might-still-invoke-a-skill-if-your-description-matches-strongly-enough-but-its-relying-on-the-description-alone-to-catch-its-attention-during-the-forward-pass-thats-a-much-weaker-signalthe-practical-consequence-if-you-write-a-skill-for-a-task-type-that-isnt-file-creation-or-code-writing--say-a-skill-for-how-your-team-handles-incident-postmortems-or-tone-guidelines-for-executive-communication--and-you-wonder-why-its-not-triggering-reliably-this-is-whythe-fix-is-simple-add-an-explicit-instruction-to-your-claudemd-that-names-the-trigger-condition-and-the-file-path-before-responding-to-any-question-about-incidents-first-read-this-skill-that-gives-you-the-same-forcing-function-the-built-in-instruction-provides-but-for-your-task-typeskills-arent-self-activating-the-description-is-a-hint-not-a-contract-if-you-need-guaranteed-activation-you-need-an-explicit-instruction">Skills look like a smart routing system — describe what a skill does, and Claude figures out when to use it. But the routing isn't magic, and it isn't symmetric.<br />
There's an instruction baked into Claude Code's system prompt that says roughly: before writing code or creating files, check whether any skills are relevant. That instruction is what makes skills feel reliable for those task types. It's a forcing function — the model is explicitly told to look before it acts.<br />
For everything else — answering questions, explaining concepts, responding to anything conversational — there's no forcing function. The model might still invoke a skill if your description matches strongly enough, but it's relying on the description alone to catch its attention during the forward pass. That's a much weaker signal.<br />
The practical consequence: if you write a skill for a task type that isn't file creation or code writing — say, a skill for how your team handles incident postmortems, or tone guidelines for executive communication — and you wonder why it's not triggering reliably, this is why.<br />
The fix is simple: add an explicit instruction to your CLAUDE.md that names the trigger condition and the file path. &quot;Before responding to any question about incidents, first read this skill.&quot; That gives you the same forcing function the built-in instruction provides, but for your task type.<br />
Skills aren't self-activating. The description is a hint, not a contract. If you need guaranteed activation, you need an explicit instruction.</h2>

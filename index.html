<p>Goals<br />
Explain LLM and embeddings<br />
Explain how the full context is all that can be reasoned about<br />
Explain how the full context is being processed every time</p>
<p>If my great-grandfather Svend as a kid was transported to today and watched this Teams meeting it would appear completely mysterious to him how on Earth this even worked. Not magic, just mysterious. Of course, we all know how it works, generally: we know you can watch live video on a screen, that cameras and microphones exists, that there's the internet for sending data around the world immediately. It's not magic to us, but it's actually darn impressive. We also know the limits: the camera can't smell us, we can't touch the faces on the screen and feel them. Completely natural limitations to us, been like that for ages.</p>
<p>It's maybe a bit of a stretch, but I feel we look at AI a bit like that today. We use it and can seen it being incredibly capable and useful. But how it actually works and what it can or can't do eludes us. It's a mystery box with unclear behavior yet grand expectation.</p>
<p>How often have you hear anybody say</p>
<ul>
<li data-marpit-fragment="1">Just feed the entire codebase the AI and let it figure it out</li>
<li data-marpit-fragment="2">Point it to Confluence</li>
<li data-marpit-fragment="3">Install an MCP server - or a skill, or write an agent.md file</li>
<li data-marpit-fragment="4">&quot;Don't say place&quot; - or &quot;Do say please&quot;</li>
<li data-marpit-fragment="5">It's very useful to convert your PDFs to markdown before handing it to the AI</li>
</ul>
<p>If I were to say &quot;I'm here to tell you that it's not actually a magic mystery box&quot; then that would be condescending because of course I know that you know it's not a magic mystery box. So instead I'm saying: I'm here to de-mystify the box&quot;.<br />
Not all the tools [slide of Claude newest feature youtube]</p>
<p>Intro<br />
Years ago, Java bytecode and .NET MSIL. Lead to Eqatec profiler, leading .NET code profiler in the World. Another story for another tech talk.<br />
Some things just grabs me. A feel a hunger to know about it. A hunger I wish I had for SQL databases and Amazon permissions.<br />
AI grabbed me. Over the past half year I've indulged in digging deep into it and in doing so I've identified some few core principles than people often don't know and where knowing them would make you so much more proficient in dealing with just about any kind of current AI-service.<br />
This talk started out by me finding it so interesting and also overwhelming that I thought &quot;hey, I should tell othera about this&quot;. And then it sort of went crawy because even though I narrowed the topic there's still SO much to say. I could speak the entire day. So though you think I'm throwing a lot at you, it's really the condensed version. And it's the parts that will produce some &quot;aha&quot; moments, allowing you to reason about how you're using AI from first-principles. clarify the few simple core ideas.<br />
Misconceptions every day<br />
Every day I hear misconceptions. I've sufferede from some severe misconceptions myself. Even Nate said the &quot;convert pdfs to markdown&quot; myth.<br />
I don't claim to know everything. Not all the math, definitely not the various agent-workflows. But I now know quite well how the core functionality works, and it's been eye opening.<br />
I hope to clear up the myths, to explain why &quot;context is everything&quot;, and hopefully the added enlightment will be greater than the added confusion. We'll see.<br />
Even if you understand this, it's still not super-easy to know exactly what to do, but you've got a better foundation.</p>

<p>A detour: An embedding<br />
An embedding is a high-dimensional set of characteristics, the very essense of a word. Super-important concept!  Features, trait, aspect<br />
12288 dimensions. More dimensions, more room to encode nuances<br />
Embedding: all concepts, for-loops, urgency. But how can 12K dims encode this?!<br />
the attention layers, all tokens attend to previous tokens =&gt; n^2<br />
the final token has absorbed, soaked up, the full meaning of all the tokens before it, ready to find the likely next token<br />
The special tokens, can't be in the text: eg stop, turn-taking, etc.<br />
Takeaway: the model only understands and can process tokens.<br />
In a way, cs has come up with a way of capturing the meaning of a word that works remarkably well. You can do math on it. Mind blown. This (vectorj truly encapsulates the overall meaning of the word “kitten”. But what about languages? Well “fart” captures a smell, but also a hint of “speed”.</p>
<p>The LLM<br />
&quot;It's just a fancy auto-complete&quot; - yes, more accurately than you'd think<br />
Brief example of auto-regressive generated text from an LLM: <a href="https://claude.ai/chat/c0fddd6f-9dab-4bb6-af04-9850e54d7601">https://claude.ai/chat/c0fddd6f-9dab-4bb6-af04-9850e54d7601</a><br />
The core part of the LLM, the Transformer, can do one thing: take a text and produce the most likely next word<br />
The transformer architecture was the key to the development of LLMs. These days, most LLMs only contain a decoder component.<br />
Already I'm lying: take sequence of tokens and produce likelihoods for the next token<br />

<p>The clients:<br />
An AI harness is the external software framework that wraps around an LLM to extend its capabilities beyond text generation, enabling it to function as a persistent, tool-using agent capable of taking real-world actions.<br />
Memory management addresses one of the most significant constraints of raw LLMs: their fixed context windows and lack of persistent memory. Standard language models begin each session with no recollection of previous interactions, forcing them to operate without historical context. The harness implements memory systems-including persistent context logs, summaries, and external knowledge stores-that carry information across sessions, enabling the agent to learn from past experiences and maintain continuity across multiple interactions.<br />
Tool execution and external action represents another essential function. Language models alone can only produce text; they cannot browse the web, execute code, query databases, or generate images. The harness monitors the model’s output for special tool-call commands and executes those operations on the model’s behalf. When a tool call is detected, the harness pauses text generation, executes the requested operation in the external environment (such as performing a web search or running code in a sandbox), and feeds the results back into the model’s context. This mechanism effectively gives the model “hands and eyes,” transforming textual intentions into tangible real-world actions.<br />
Context management and orchestration ensure that information flows efficiently between the model and its environment. The harness determines what information is provided to the model at each step, managing the transient prompt whilst maintaining a persistent task log separate from the model’s immediate context. This separation is crucial for long-running projects: even if an AI agent instance stops and a new one begins later with no memory in the raw LLM, the project itself retains memory through files and logs maintained by the harness.	<br />

<p>Myth or Fact?<br />
Saying Please<br />
The model was trained on human-generated text and shaped by human feedback. In that training data, polite interactions statistically correlated with cooperative, thorough responses. Terse or hostile interactions statistically correlated with shorter or more guarded responses. The model has absorbed those patterns. So there’s a real but small effect — not because politeness is being rewarded, but because the model is mirroring the statistical associations it learned.<br />
Similarly, being aggressive or rude might slightly degrade output quality — not because the model feels hurt, but because aggressive framing correlates with adversarial patterns in training data that the model has learned to respond to differently.<br />
The honest summary: politeness doesn’t hurt and might have a marginal positive effect via tone mirroring, but it’s near the bottom of the list of things that determine output quality. Anyone optimising prompts by adding “please” instead of adding specificity is working on the wrong variable.​​​​​​​​​​​​​​​​<br />
But the real reason is that being nice even in simulated dialog is good for <em>you</em>. Now if you're a no nonsense engineer that's fine, I guess saying nothing is a compliment for you, that counts. But being severely disagreeable to an AI agent wreaks havoc with <em>your</em> hormones, dumping cortisol all over the place and leading to chronic stress, which leads to all sorts of illnesses- not to mention poor mental health outcomes.<br />
Being impeccably polite and agreeable on the other hand triggers <em>your</em> oxitocin. You're more relaxed and happy. This works even if you know you are engaged in a simulated conversation. So be nice to Claude- it's just like being nice to yourself.<br />
&quot;The Dumb zone&quot; - U-shaped forgetful middle<br />
the U-shape is an emergent artifact of training and prompt structure, not a fundamental architectural constraint. it’s less reliable not because of anything intrinsic to attention near the end, but simply because the model saw fewer examples there. That’s it. Everything else — the U-shape, the percentage thresholds, general “degradation” — is either an artifact of prompt structure, an overgeneralization from specific benchmarks, or folklore that propagated because it’s easy to operationalize.​​​​​​​​​​​​​​​​<br />
